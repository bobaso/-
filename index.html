<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>リバーシゲーム</title>

<link rel="stylesheet" href="style.css">
</head>

<body>
<!-- スタート画面 -->
<div id="startScreen">

    <img src="start.png" id="startImage" alt="スタート">

    <button id="singleBtn"></button>

    <button id="multiBtn"></button>

</div>

<!-- ゲーム画面 -->
<div id="gameScreen" style="display:none;">

    <!-- 今までのゲーム画面 -->
    <div class="container">

        <!-- 今までのHTML -->

    </div>

</div>

<script src="script.js"></script>
    
<div class="container">

    <h1>リバーシゲーム</h1>

    <div class="scoreBoard">
        <div>⚫ あなた：<span id="blackCount">2</span></div>
        <div>⚪ あいて：<span id="whiteCount">2</span></div>
    </div>

    <div id="message">
        あなたの番です
    </div>

<div class="boardWrapper">

    <div id="board"></div>

    <div id="gameOverPanel">

        <div class="gameOverBox">

            <h2 id="resultMessage"></h2>

            <button id="restartBtn">
                もう一回遊ぶ
            </button>

        </div>

    </div>

</div>
</div>

<script src="script.js"></script>

</body>

</html>
