<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
　
<title>リバーシゲーム</title>
　
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- スタート画面 -->
<div id="startScreen">

    <div id="startContainer">

        <img src="start.png"
             id="startImage"
             alt="スタート">

      <img src="singleBtn.png"
     id="singleImage"
     alt="ひとりで遊ぶ">

<img src="multiBtn.png"
     id="multiImage"
     alt="ふたりで遊ぶ">

        <button id="singleBtn"></button>

        <button id="multiBtn"></button>

    </div>

</div>

<!--=========================
    難易度選択画面
==========================-->
<div id="difficultyScreen">

    <div id="difficultyContainer">

        <img src="difficulty.png"
             id="difficultyImage"
             alt="難易度選択">

        <img src="easyBtn.png"
             id="easyImage"
             alt="かんたん">

        <img src="normalBtn.png"
             id="normalImage"
             alt="ふつう">

        <img src="hardBtn.png"
             id="hardImage"
             alt="むずかしい">

        <img src="backCircle.png"
             id="backImage"
             alt="戻る">

        <button id="easyBtn"></button>
        <button id="normalBtn"></button>
        <button id="hardBtn"></button>

        <button id="backBtn"></button>

    </div>

</div>


<!-- ゲーム画面 -->
<div id="gameScreen">

    <div class="container">

    <!-- タイトル -->
    <img src="title.png"
         id="titleImage"
         alt="タイトル">

    <!-- スコア -->
        <div class="scoreWrap">

            <img src="score.png"
                 class="scoreBg"
                 alt="スコア">

            <div id="blackCount"
                 class="scoreNum leftScore">2</div>

            <div id="whiteCount"
                 class="scoreNum rightScore">2</div>

        </div>

        <!-- メッセージ -->
        <div id="message"></div>

        <!-- 盤面 -->
        <div class="boardWrapper">

            <div id="board"></div>

            <!-- 終了画面 -->
            <div id="gameOverPanel">

                <div class="gameOverBox">

                    <div id="resultMessage"></div>

                    <button id="restartBtn">
                        もう一回遊ぶ
                    </button>

                </div>

            </div>

        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
