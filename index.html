<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>リバーシゲーム</title>

<link rel="stylesheet" href="style.css">
</head>

<body>
　
<!-- スタート画面 -->
<div id="startScreen">

    <div id="startContainer">

        <img src="start.png" id="startImage" alt="スタート背景">

        <img src="singleBtn.png" id="singleImage" alt="ひとりであそぶ">
        <img src="multiBtn.png" id="multiImage" alt="ふたりであそぶ">

        <button id="singleBtn"></button>
        <button id="multiBtn"></button>

    </div>

</div>

<!-- ゲーム画面 -->
<div id="gameScreen" style="display:none;">

    <div class="container">

        <!-- スコア（画像UI） -->
        <div class="scoreWrap">

            <img src="title.png" class="scoreBg" alt="スコア背景">

            <div class="scoreText">
                <div id="blackCount">2</div>
                <div id="whiteCount">2</div>
            </div>

        </div>

        <!-- メッセージ -->
        <div id="message">
            あなたの番です
        </div>

        <!-- 盤面 -->
        <div class="boardWrapper">

            <div id="board"></div>

            <!-- ゲーム終了 -->
            <div id="gameOverPanel">

                <div class="gameOverBox">

                    <h2 id="resultMessage"></h2>

                    <button id="restartBtn">
                        もう一回遊ぶ
                    </button>

                </div>

            </div>

        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
